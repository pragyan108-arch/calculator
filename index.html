<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Scientific Calculator</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.calculator {
  background:#111;
  width:95%;
  max-width:400px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#expression {
  color:#aaa;
  font-size:14px;
  min-height:18px;
  text-align:right;
  word-wrap:break-word;
}

#display {
  width:100%;
  height:55px;
  font-size:22px;
  border:none;
  border-radius:8px;
  margin-bottom:10px;
  padding:8px;
  text-align:right;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.toggle {
  background:#444;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
}

.buttons {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}

button {
  padding:14px;
  font-size:15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#333;
  color:white;
}

button:hover { background:#555; }

.operator { background:#ff9500; }
.equal { background:#28a745; grid-column:span 2; }
.clear { background:red; }

.history {
  margin-top:10px;
  background:#1b1b1b;
  max-height:120px;
  overflow-y:auto;
  padding:8px;
  border-radius:8px;
  font-size:13px;
  color:#ccc;
}
.history div { margin-bottom:4px; }
</style>
</head>

<body>

<div class="calculator">

  <div class="top-bar">
    <button class="toggle" onclick="toggleMode()" id="modeBtn">DEG</button>
    <button class="toggle" onclick="clearHistory()">Clear History</button>
  </div>

  <div id="expression"></div>
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="appendTrig('sin')">sin</button>
    <button onclick="appendTrig('cos')">cos</button>
    <button onclick="appendTrig('tan')">tan</button>
    <button onclick="append('Math.log10(')">log</button>
    <button onclick="append('Math.log(')">ln</button>

    <button onclick="append('Math.sqrt(')">√</button>
    <button onclick="append('**2')">x²</button>
    <button onclick="append('**')">xʸ</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('/')">÷</button>
    <button class="clear" onclick="clearDisplay()">C</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('*')">×</button>
    <button onclick="backspace()">←</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('-')">−</button>
    <button onclick="append('.')">.</button>

    <button onclick="append('0')">0</button>
    <button class="operator" onclick="append('+')">+</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>

  <div class="history" id="history"></div>

</div>

<script>
let display = document.getElementById("display");
let expression = document.getElementById("expression");
let historyDiv = document.getElementById("history");
let isDegree = true;

function updateExpression() {
  expression.textContent = display.value;
}

function append(value) {
  display.value += value;
  updateExpression();
}

function appendTrig(func) {
  if (isDegree) {
    display.value += `Math.${func}((Math.PI/180)*`;
  } else {
    display.value += `Math.${func}(`;
  }
  updateExpression();
}

function clearDisplay() {
  display.value="";
  updateExpression();
}

function backspace() {
  display.value = display.value.slice(0,-1);
  updateExpression();
}

function toggleMode() {
  isDegree = !isDegree;
  document.getElementById("modeBtn").textContent = isDegree ? "DEG" : "RAD";
}

function calculate() {
  try {
    let result = eval(display.value);
    historyDiv.innerHTML += `<div>${display.value} = ${result}</div>`;
    display.value = result;
    updateExpression();
  } catch {
    display.value="Error";
  }
}

function clearHistory() {
  historyDiv.innerHTML="";
}

document.addEventListener("keydown", function(e){
  if(!isNaN(e.key) || "+-*/().".includes(e.key)){
    append(e.key);
  }
  if(e.key==="Enter") calculate();
  if(e.key==="Backspace") backspace();
  if(e.key==="Escape") clearDisplay();
});
</script>

</body>
</html>
