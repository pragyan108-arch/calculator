<!DOCTYPE html>
<html>
<head>
  <title>Pragyan Calculator</title>
  <meta name="description" content="Free Online Calculator made by Pragyan Sharma">
  <meta name="keywords" content="online calculator, free calculator, simple calculator">
  <meta name="author" content="Pragyan Sharma">

  <style>
    body {
      background: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #2b2b2b;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
    }

    input {
      width: 100%;
      height: 60px;
      font-size: 22px;
      text-align: right;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
      padding-right: 10px;
    }

    button {
      width: 22%;
      height: 50px;
      margin: 5px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .operator { background: orange; color: white; }
    .equal { background: green; color: white; }
    .clear { background: red; color: white; }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="operator" onclick="press('/')">/</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="operator" onclick="press('*')">*</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="operator" onclick="press('-')">-</button>

    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="press('0')">0</button>
    <button class="equal" onclick="calculate()">=</button>
    <button class="operator" onclick="press('+')">+</button>
  </div>
</div>

<script>
  function press(value) {
    document.getElementById("display").value += value;
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }

  function calculate() {
    try {
      document.getElementById("display").value =
        eval(document.getElementById("display").value);
    } catch {
      document.getElementById("display").value = "Error";
    }
  }
</script>

</body>
</html>
