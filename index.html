<!DOCTYPE html>
<html>
<head>
  <title>Advanced Scientific Calculator</title>
  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 360px;
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 22px;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      text-align: right;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #333;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #555;
    }

    .operator {
      background: #ff9500;
    }

    .operator:hover {
      background: #e08900;
    }

    .equal {
      background: #28a745;
      grid-column: span 2;
    }

    .equal:hover {
      background: #1e7e34;
    }

    .clear {
      background: red;
    }
  </style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="append('Math.sin(')">sin</button>
    <button onclick="append('Math.cos(')">cos</button>
    <button onclick="append('Math.tan(')">tan</button>
    <button onclick="append('Math.log10(')">log</button>
    <button onclick="append('Math.log(')">ln</button>

    <button onclick="append('Math.sqrt(')">√</button>
    <button onclick="append('**2')">x²</button>
    <button onclick="append('**')">xʸ</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('/')">÷</button>
    <button class="clear" onclick="clearDisplay()">C</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('*')">×</button>
    <button onclick="backspace()">←</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('-')">−</button>
    <button onclick="append('.')">.</button>

    <button onclick="append('0')">0</button>
    <button class="operator" onclick="append('+')">+</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  const display = document.getElementById("display");

  function append(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = "";
  }

  function backspace() {
    display.value = display.value.slice(0, -1);
  }

  function calculate() {
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Error";
    }
  }

  // Keyboard Support
  document.addEventListener("keydown", function(event) {
    if (!isNaN(event.key) || "+-*/().".includes(event.key)) {
      append(event.key);
    }
    if (event.key === "Enter") {
      calculate();
    }
    if (event.key === "Backspace") {
      backspace();
    }
    if (event.key === "Escape") {
      clearDisplay();
    }
  });
</script>

</body>
</html>
